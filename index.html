<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PyBot AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--surface:#18181f;--panel:#1e1e28;--border:#2a2a38;
  --accent:#7c6df0;--accent2:#a78bfa;--green:#34d399;--red:#f87171;
  --text:#e8e8f0;--muted:#6b6b80;--dim:#3a3a50;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh}
.shell{display:flex;width:min(980px,100vw);height:min(800px,100vh);background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.sidebar{width:230px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px}
.logo{display:flex;align-items:center;gap:9px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-name{font-size:14px;font-weight:600;letter-spacing:-.01em}
.new-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;width:100%;margin-bottom:6px}
.new-btn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(124,109,240,.07)}
.section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:10px 8px 4px}
.sessions-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sess-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:9px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s}
.sess-item:hover{background:var(--panel);color:var(--text)}
.sess-item.active{background:rgba(124,109,240,.15);color:var(--accent2)}
.sess-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess-del{opacity:0;font-size:14px;padding:1px 3px;border-radius:4px;transition:opacity .15s;background:none;border:none;color:inherit;cursor:pointer}
.sess-item:hover .sess-del{opacity:.5}
.sess-del:hover{opacity:1!important;color:var(--red)}
.sidebar-foot{margin-top:8px;display:flex;align-items:center;gap:9px;padding:10px 8px 0;border-top:1px solid var(--border)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-plan{font-size:11px;color:var(--muted)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:14px;font-weight:600}
.online-badge{display:flex;align-items:center;gap:5px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;color:var(--green)}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:glow 2s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.35}}
.topbar-actions{display:flex;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{border-color:var(--dim);color:var(--text);background:var(--panel)}
body.light{--bg:#f5f5f7;--surface:#fff;--panel:#f0f0f5;--border:#e0e0ea;--text:#1a1a2e;--muted:#6b6b80;--dim:#b0b0c0}
body.light .bubble.bot{background:#f0f0f8;border-color:#e0e0ee;color:#1a1a2e}
.messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:30px;text-align:center}
.welcome-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:30px}
.welcome h2{font-size:22px;font-weight:600}
.welcome p{font-size:14px;color:var(--muted);max-width:320px;line-height:1.6}
.welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}

.row{display:flex;gap:10px;align-items:flex-start}
.row.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:2px}
.msg-avatar.bot{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg-avatar.user{background:linear-gradient(135deg,#0ea5e9,#22d3ee);font-weight:700}
.col{display:flex;flex-direction:column;max-width:74%;gap:4px}
.col.user{align-items:flex-end}
.bubble{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.7;word-break:break-word}
.bubble.bot{background:var(--panel);border:1px solid var(--border);color:var(--text);border-top-left-radius:4px}
.bubble.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-top-right-radius:4px}
.bubble pre{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px 14px;font-family:var(--mono);font-size:12.5px;overflow-x:auto;margin:8px 0;white-space:pre}
.bubble.user pre{background:rgba(0,0,0,.2)}
.bubble code{font-family:var(--mono);font-size:12px;background:rgba(124,109,240,.15);border:1px solid rgba(124,109,240,.2);padding:1px 5px;border-radius:4px;color:var(--accent2)}
.bubble.user code{background:rgba(255,255,255,.15);border-color:transparent;color:#fff}
.code-wrap{position:relative;margin:8px 0}
.code-wrap pre{margin:0}
.copy-btn{position:absolute;top:7px;right:7px;padding:3px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:11px;font-family:inherit;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.copy-btn.copied{color:var(--green);border-color:var(--green)}
.ts{font-size:11px;color:var(--dim);padding:0 2px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.chip{padding:5px 11px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(124,109,240,.1)}
.typing{display:flex;gap:5px;padding:6px 2px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.5;animation:bounce 1.1s infinite}
.dot:nth-child(2){animation-delay:.18s}
.dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
.error-bubble{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red);padding:10px 14px;border-radius:12px;font-size:13px}
.input-wrap{padding:14px 16px 16px;border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--panel);border:1.5px solid var(--border);border-radius:13px;padding:10px 12px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--accent)}
.mic-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mic-btn:hover,.mic-btn.active{color:var(--red);border-color:var(--red);background:rgba(248,113,113,.08)}
.mic-btn.active{animation:mic-pulse 1s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 6px rgba(248,113,113,0)}}
textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-size:14px;font-family:inherit;color:var(--text);line-height:1.55;min-height:22px;max-height:120px}
textarea::placeholder{color:var(--dim)}
.send-btn{width:34px;height:34px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s}
.send-btn:hover:not(:disabled){opacity:.85;transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:default}
.hint{font-size:11px;color:var(--dim);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-mark">✨</div>
      <span class="logo-name">PyBot AI</span>
    </div>
    <button class="new-btn" onclick="newSession()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>
    <div class="section-label">Recent chats</div>
    <div class="sessions-list" id="sessionsList"></div>
    <div class="sidebar-foot">
      <div class="avatar">U</div>
      <div>
        <div class="user-name">User</div>
        <div class="user-plan">Free plan</div>
      </div>
    </div>
  </nav>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">PyBot AI</span>
        <div class="online-badge"><div class="online-dot"></div> Online</div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Export" onclick="exportChat()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn" title="Theme" onclick="toggleTheme()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="icon-btn" title="Clear" onclick="clearChat()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✨</div>
        <h2>Namaste! Main PyBot hoon 🤖</h2>
        <p>Python, coding, ya kuch bhi — bas poocho!<br>Main Hindi, Hinglish, ya English mein jawab de sakta hoon.</p>
        <div class="welcome-chips">
          <button class="chip" onclick="quickSend('Python kya hai?')">Python kya hai?</button>
          <button class="chip" onclick="quickSend('Ek function likho')">Ek function likho</button>
          <button class="chip" onclick="quickSend('List vs Tuple difference')">List vs Tuple difference</button>
          <button class="chip" onclick="quickSend('Mera code fix karo')">Mera code fix karo</button>
          <button class="chip" onclick="quickSend('Flask kya hota hai?')">Flask kya hota hai?</button>
          <button class="chip" onclick="quickSend('OOP explain karo')">OOP explain karo</button>
        </div>
      </div>
    </div>

    <div class="input-wrap">
      <div class="input-row">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <textarea id="inp" placeholder="Kuch bhi poocho..." rows="1" onkeydown="onKey(event)" oninput="grow(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
      <p class="hint">Developed by Antariksh Sawarbandhe</p>
    </div>
  </div>
</div>

<script>
let busy = false;
let currentSession = null;
let sessionMeta = {};
let recognition = null;
let micActive = false;

const $ = id => document.getElementById(id);
const msgBox = () => $('messages');
const now = () => new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function scrollEnd(){const m=msgBox();m.scrollTop=m.scrollHeight}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function hideWelcome(){const w=$('welcome');if(w)w.remove()}

function format(text){
  let out='',lines=text.split('\n'),inCode=false,codeLines=[],codeLang='';
  for(let line of lines){
    if(line.startsWith('```')){
      if(!inCode){inCode=true;codeLang=line.slice(3).trim();codeLines=[];}
      else{
        const code=esc(codeLines.join('\n'));
        const enc=encodeURIComponent(codeLines.join('\n'));
        out+=`<div class="code-wrap"><pre><code>${code}</code></pre><button class="copy-btn" onclick="copyCode(this,'${enc}')">Copy</button></div>`;
        inCode=false;
      }
      continue;
    }
    if(inCode){codeLines.push(line);continue;}
    let l=esc(line).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
    out+=l+'\n';
  }
  if(inCode)out+=`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`;
  return out.trim();
}

function copyCode(btn,encoded){
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(()=>{
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1800);
  });
}

function addBot(text,chips){
  hideWelcome();
  const chipsHtml=chips?`<div class="chips">${chips.map(c=>`<button class="chip" onclick="quickSend('${c.replace(/'/g,"\\'")}') ">${esc(c)}</button>`).join('')}</div>`:'';
  msgBox().insertAdjacentHTML('beforeend',`
    <div class="row">
      <div class="msg-avatar bot">✨</div>
      <div class="col">
        <div class="bubble bot">${format(text)}</div>
        ${chipsHtml}
        <span class="ts">${now()}</span>
      </div>
    </div>`);
  scrollEnd();
}

function addUser(text){
  hideWelcome();
  msgBox().insertAdjacentHTML('beforeend',`
    <div class="row user">
      <div class="col user">
        <div class="bubble user">${format(text)}</div>
        <span class="ts">${now()}</span>
      </div>
      <div class="msg-avatar user">U</div>
    </div>`);
  scrollEnd();
}

function addTyping(){
  msgBox().insertAdjacentHTML('beforeend',`
    <div class="row" id="typing">
      <div class="msg-avatar bot">✨</div>
      <div class="bubble bot"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    </div>`);
  scrollEnd();
}

function removeTyping(){$('typing')?.remove()}

function addError(msg){
  hideWelcome();
  msgBox().insertAdjacentHTML('beforeend',`<div class="error-bubble">⚠️ ${esc(msg)}</div>`);
  scrollEnd();
}

function quickSend(text){$('inp').value=text;send()}

async function newSession(silent=false){
  const res=await fetch('/session/new',{method:'POST'});
  const {session_id}=await res.json();
  currentSession=session_id;
  const name='Chat '+(Object.keys(sessionMeta).length+1);
  sessionMeta[session_id]={name};
  renderSidebar();
  if(!silent){
    msgBox().innerHTML=`<div class="welcome" id="welcome">
      <div class="welcome-icon">✨</div>
      <h2>Naya Chat!</h2>
      <p>Kuch bhi poocho 😊</p>
      <div class="welcome-chips">
        <button class="chip" onclick="quickSend('Python kya hai?')">Python kya hai?</button>
        <button class="chip" onclick="quickSend('Ek function likho')">Ek function likho</button>
        <button class="chip" onclick="quickSend('Mera code fix karo')">Mera code fix karo</button>
      </div>
    </div>`;
  }
}

function switchSession(sid){
  currentSession=sid;
  renderSidebar();
  msgBox().innerHTML=`<div class="welcome" id="welcome">
    <div class="welcome-icon">✨</div>
    <h2>Is session mein wapas aaye!</h2>
    <p>Kuch bhi poocho 😊</p>
  </div>`;
}

function deleteSession(sid,e){
  e.stopPropagation();
  delete sessionMeta[sid];
  fetch('/session/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});
  const remaining=Object.keys(sessionMeta);
  if(remaining.length) switchSession(remaining[remaining.length-1]);
  else newSession();
}

function renderSidebar(){
  $('sessionsList').innerHTML=Object.entries(sessionMeta).reverse().map(([sid,meta])=>`
    <div class="sess-item ${sid===currentSession?'active':''}" onclick="switchSession('${sid}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="sess-name">${meta.name}</span>
      <button class="sess-del" onclick="deleteSession('${sid}',event)">✕</button>
    </div>`).join('');
}

async function clearChat(){
  await fetch('/session/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:currentSession})});
  msgBox().innerHTML=`<div class="welcome" id="welcome">
    <div class="welcome-icon">✨</div>
    <h2>Chat clear ho gaya!</h2>
    <p>Fresh start karo 🙂</p>
  </div>`;
}

async function exportChat(){
  const res=await fetch('/session/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:currentSession})});
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='pybot-chat.txt';a.click();
  URL.revokeObjectURL(url);
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');
}
if(localStorage.getItem('theme')==='light')document.body.classList.add('light');

function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    addError('Voice input Chrome mein kaam karta hai. Chrome use karo.');return;
  }
  if(micActive){recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='hi-IN';
  recognition.interimResults=true;
  recognition.onstart=()=>{micActive=true;$('micBtn').classList.add('active')};
  recognition.onend=()=>{micActive=false;$('micBtn').classList.remove('active')};
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    $('inp').value=t;grow($('inp'));
    if(e.results[e.results.length-1].isFinal)send();
  };
  recognition.onerror=()=>{micActive=false;$('micBtn').classList.remove('active')};
  recognition.start();
}

async function send(){
  if(busy)return;
  const inp=$('inp');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';inp.style.height='auto';
  busy=true;$('sendBtn').disabled=true;
  addUser(text);
  addTyping();

  try{
    const res=await fetch('/chat/stream',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,session_id:currentSession})
    });

    if(!res.ok){
      const d=await res.json();
      removeTyping();addError(d.error||'Kuch gadbad hui');
      busy=false;$('sendBtn').disabled=false;return;
    }

    removeTyping();
    msgBox().insertAdjacentHTML('beforeend',`
      <div class="row" id="stream-row">
        <div class="msg-avatar bot">✨</div>
        <div class="col">
          <div class="bubble bot" id="stream-bubble"></div>
          <span class="ts" id="stream-ts"></span>
        </div>
      </div>`);
    scrollEnd();

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let raw='';
    const bubble=$('stream-bubble');

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      const chunk=decoder.decode(value,{stream:true});
      for(const line of chunk.split('\n')){
        if(!line.startsWith('data:'))continue;
        try{
          const data=JSON.parse(line.slice(5).trim());
          if(data.token){raw+=data.token;bubble.innerHTML=format(raw);scrollEnd();}
          if(data.done){$('stream-ts').textContent=now();}
        }catch(e){}
      }
    }

    if(sessionMeta[currentSession]&&sessionMeta[currentSession].name.startsWith('Chat ')){
      sessionMeta[currentSession].name=text.slice(0,28)+(text.length>28?'…':'');
      renderSidebar();
    }

  }catch(err){
    removeTyping();addError('Server se connect nahi ho pa raha. app.py chal raha hai?');
  }

  busy=false;$('sendBtn').disabled=false;inp.focus();
}

window.onload=async()=>{
  await newSession(true);
};
</script>
</body>
</html>
